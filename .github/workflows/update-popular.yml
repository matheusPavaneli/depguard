name: Update popular packages list

on:
  schedule:
    # Every Monday at 03:00 UTC
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Regenerate popular packages list
        run: npm run generate:popular

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet src/data/popular-packages.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: refresh popular-packages list from npm search"
          branch: chore/update-popular-packages
          delete-branch: true
          title: "chore: update popular packages list"
          body: |
            Automated weekly refresh of `src/data/popular-packages.ts`.

            This keeps the typosquatting detection up-to-date with newly popular packages
            that could be targeted by supply-chain attackers.

            Generated by the **Update popular packages list** workflow.
