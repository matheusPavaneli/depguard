name: Eval metrics

on:
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Run fixture eval (network)
        run: npm run eval:metrics
        env:
          STRICT_EVAL: "1"
